<script>
const SUPABASE_URL = 'https://ijqizaquvtpphqkysaoi.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-vNnHjrgEPT2QvjIuBnK1Q_8BZZAU9V';

let supabaseClient;

const CATEGORIES = {
    review: { label: '深度评测', icon: '🔍', class: 'cat-review' },
    report: { label: '市场报告', icon: '📊', class: 'cat-report' },
    guide: { label: '选购指南', icon: '📖', class: 'cat-guide' },
    news: { label: '行业动态', icon: '📰', class: 'cat-news' }
};

const CATEGORY_ICONS = {
    review: '🔍',
    report: '📊',
    guide: '📖',
    news: '📰'
};

async function initSupabase() {
    try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        return true;
    } catch (e) {
        console.error('Supabase init failed:', e);
        return false;
    }
}

function getUrlParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        slug: params.get('slug'),
        category: params.get('cat') || 'all'
    };
}

function formatDate(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = now - d;
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);

    if (mins < 60) return `${mins} 分钟前`;
    if (hours < 24) return `${hours} 小时前`;
    if (days < 7) return `${days} 天前`;
    return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
}

// ===== List View =====
function renderListPage(category = 'all') {
    const app = document.getElementById('app');
    const catLabel = category === 'all' ? '全部文章' : (CATEGORIES[category]?.label || '全部文章');

    app.innerHTML = `
        <div class="page-header">
            <h1>${catLabel}</h1>
            <p>用数据和探针说话，帮你全面了解各大中转站的真实表现</p>
        </div>
        <div class="tabs">
            <div class="tab ${category === 'all' ? 'active' : ''}" data-cat="all">全部</div>
            <div class="tab ${category === 'review' ? 'active' : ''}" data-cat="review">深度评测</div>
            <div class="tab ${category === 'report' ? 'active' : ''}" data-cat="report">市场报告</div>
            <div class="tab ${category === 'guide' ? 'active' : ''}" data-cat="guide">选购指南</div>
            <div class="tab ${category === 'news' ? 'active' : ''}" data-cat="news">行业动态</div>
        </div>
        <main class="main">
            <div id="article-list">
                <div class="loading"><div class="spinner"></div><div>正在加载文章...</div></div>
            </div>
        </main>
    `;

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const cat = tab.dataset.cat;
            history.pushState(null, '', `article.html${cat === 'all' ? '' : '?cat=' + cat}`);
            renderListPage(cat);
        });
    });

    loadArticles(category);
}

async function loadArticles(category) {
    const container = document.getElementById('article-list');

    try {
        let query = supabaseClient
            .from('articles')
            .select('*')
            .eq('is_published', true)
            .order('published_at', { ascending: false })
            .limit(50);

        if (category !== 'all') {
            query = query.eq('category', category);
        }

        const { data: articles, error } = await query;

        if (error) throw error;

        if (!articles || articles.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <h3>暂无文章</h3>
                    <p>文章正在生成中，请稍后再来查看</p>
                </div>
            `;
            return;
        }

        container.innerHTML = `<div class="article-grid">${articles.map(renderArticleCard).join('')}</div>`;

        container.querySelectorAll('.article-card').forEach(card => {
            card.addEventListener('click', () => {
                window.location.href = `article.html?slug=${card.dataset.slug}`;
            });
        });

    } catch (e) {
        console.error('Load articles failed:', e);
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">⚠️</div>
                <h3>加载失败</h3>
                <p>${e.message || '请稍后重试'}</p>
            </div>
        `;
    }
}

function renderArticleCard(article) {
    const cat = CATEGORIES[article.category] || CATEGORIES.review;
    const icon = CATEGORY_ICONS[article.category] || '📄';

    const coverHtml = article.cover_image
        ? `<img src="${article.cover_image}" alt="" class="article-card-img" loading="lazy">`
        : `<div class="article-card-cover">${icon}</div>`;

    return `
        <div class="article-card" data-slug="${article.slug}">
            ${coverHtml}
            <div class="article-card-body">
                <span class="article-card-category ${cat.class}">${cat.label}</span>
                <div class="article-card-title">${escapeHtml(article.title)}</div>
                <div class="article-card-summary">${escapeHtml(article.summary || '')}</div>
                <div class="article-card-meta">
                    <span>${formatDate(article.published_at || article.created_at)}</span>
                    <span class="article-card-views">👁 ${article.view_count || 0}</span>
                </div>
            </div>
        </div>
    `;
}

// ===== Detail View =====
async function renderDetailPage(slug) {
    const app = document.getElementById('app');
    app.innerHTML = `<div class="loading"><div class="spinner"></div><div>正在加载文章...</div></div>`;

    try {
        const { data: article, error } = await supabaseClient
            .from('articles')
            .select('*')
            .eq('slug', slug)
            .eq('is_published', true)
            .single();

        if (error || !article) throw error || new Error('文章不存在');

        // Increment view count (fire and forget)
        supabaseClient
            .from('articles')
            .update({ view_count: (article.view_count || 0) + 1 })
            .eq('id', article.id)
            .then(() => {});

        const cat = CATEGORIES[article.category] || CATEGORIES.review;
        const htmlContent = marked.parse(article.content || '');

        document.title = `${article.title} - AI Club In`;

        const coverHtml = article.cover_image
            ? `<div class="article-detail-cover"><img src="${article.cover_image}" alt="${escapeHtml(article.title)}"></div>`
            : '';

        app.innerHTML = `
            <div class="page-header" style="padding: 32px 24px;">
                <a href="article.html" class="article-detail-back" style="color: white; opacity: 0.8;">&larr; 返回文章列表</a>
                <span class="article-detail-category ${cat.class}">${cat.label}</span>
                <h1 style="color: white; font-size: 1.6rem; margin-top: 8px;">${escapeHtml(article.title)}</h1>
            </div>
            <main class="main">
                <div class="article-detail">
                    <a href="article.html" class="article-detail-back">&larr; 返回文章列表</a>
                    ${coverHtml}
                    <div class="article-detail-meta">
                        <span>📅 ${formatDate(article.published_at || article.created_at)}</span>
                        <span>👁 ${article.view_count || 0} 次阅读</span>
                    </div>
                    <div class="article-content">${htmlContent}</div>
                </div>
            </main>
        `;

    } catch (e) {
        console.error('Load article failed:', e);
        app.innerHTML = `
            <div class="empty-state" style="padding-top: 80px;">
                <div class="empty-state-icon">😕</div>
                <h3>文章未找到</h3>
                <p>该文章可能已被删除或尚未发布</p>
                <a href="article.html" style="color: var(--primary); margin-top: 16px; display: inline-block;">返回文章列表</a>
            </div>
        `;
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ===== Init =====
async function main() {
    await initSupabase();
    const params = getUrlParams();

    if (params.slug) {
        await renderDetailPage(params.slug);
    } else {
        renderListPage(params.category);
    }
}

window.addEventListener('popstate', () => {
    const params = getUrlParams();
    if (params.slug) {
        renderDetailPage(params.slug);
    } else {
        renderListPage(params.category);
    }
});

main();
</script>
