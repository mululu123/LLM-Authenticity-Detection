    <style>
        :root {

            --primary-light: #818cf8;
            --primary-bg: rgba(99,102,241,0.08);
            --success: #10b981;
            --success-bg: rgba(16,185,129,0.1);

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {

        }

        .nav-links { display: flex; gap: 24px; align-items: center; }

        .hero p {

            margin: 0 auto 32px;

        }
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 40px;
        }
        .hero-stat {
            text-align: center;

        .hero-stat-num {
            font-size: 2rem;

        }
        .hero-stat-label {

        .main {

        /* ===== Toolbar ===== */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 240px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--white);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;

        .search-box input:focus { border-color: var(--primary); }
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;

            font-size: 0.85rem;
        }
        .filter-btn {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--white);
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-family: inherit;

        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active {
            background: var(--primary-bg);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== Provider Table ===== */
        .table-wrapper {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .table-header {
            display: grid;
            grid-template-columns: 2fr 80px 100px 80px 80px 120px;
            padding: 12px 20px;
            background: #f1f5f9;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);

        .provider-row {
            display: grid;
            grid-template-columns: 2fr 80px 100px 80px 80px 120px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            transition: background 0.15s;
            cursor: pointer;
        }
        .provider-row:hover { background: #f8fafc; }
        .provider-row:last-child { border-bottom: none; }

        .provider-name {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .provider-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--primary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--primary);
        }
        .provider-info h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .provider-info span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Risk Badge */
        .risk-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            width: 48px;
        }
        .risk-A { background: var(--success-bg); color: var(--success); }
        .risk-B { background: #dbeafe; color: #3b82f6; }
        .risk-C { background: var(--warning-bg); color: var(--warning); }
        .risk-D { background: var(--danger-bg); color: var(--danger); }
        .risk-untested { background: #f1f5f9; color: var(--text-muted); }

        /* Rating Stars */
        .rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
        }
        .stars { color: #fbbf24; letter-spacing: 1px; }
        .rating-count { color: var(--text-muted); font-size: 0.75rem; }

        .model-count, .avg-mult {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .view-btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--white);
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
        }
        .view-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-bg);
        }

        /* ===== Empty State ===== */

            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-state h3 { color: var(--text-secondary); margin-bottom: 8px; }

        /* ===== Loading ===== */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Footer ===== */
        .footer {
            border-top: 1px solid var(--border);
            padding: 40px 24px;
            margin-top: 60px;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 32px;
        }
        .footer-col h4 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }
        .footer-col a {
            display: block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 8px;
            transition: color 0.2s;
        }
        .footer-col a:hover { color: var(--primary); }
        .footer-bottom {
            max-width: 1200px;
            margin: 24px auto 0;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .hero h1 { font-size: 1.75rem; }
            .hero-stats { gap: 24px; }
            .hero-stat-num { font-size: 1.5rem; }
            .table-header { display: none; }
            .provider-row {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                padding: 16px;
            }
            .toolbar { flex-direction: column; }
            .search-box { min-width: 100%; }
        }
    </style>
</head>

<script>
const SUPABASE_URL = 'https://ijqizaquvtpphqkysaoi.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-vNnHjrgEPT2QvjIuBnK1Q_8BZZAU9V';

let supabaseClient;
let allProviders = [];
let currentFilter = 'all';
let searchQuery = '';

async function initSupabase() {
    try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        return true;
    } catch (e) {
        console.error('Supabase init failed:', e);
        return false;
    }
}

async function loadProviders() {
    try {
        const { data, error } = await supabaseClient
            .from('providers')
            .select('*')
            .order('risk_level', { ascending: true });

        if (error) throw error;
        return data || [];
    } catch (e) {
        console.error('Load providers failed:', e);
        return null;
    }
}

function renderProviders(providers) {
    const container = document.getElementById('provider-list');

    if (!providers || providers.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="icon">🔍</div>
                <h3>${searchQuery ? '没有找到匹配的站点' : '暂无数据'}</h3>
                <p>${searchQuery ? '试试其他关键词' : '站点数据正在准备中，请稍后再来'}</p>
            </div>`;
        return;
    }

    const riskOrder = { A: 0, B: 1, C: 2, D: 3, untested: 4 };
    const sorted = [...providers].sort((a, b) => {
        const ra = riskOrder[a.risk_level] ?? 9;
        const rb = riskOrder[b.risk_level] ?? 9;
        if (ra !== rb) return ra - rb;
        return (b.avg_rating || 0) - (a.avg_rating || 0);
    });

    container.innerHTML = sorted.map(p => {
        const initial = p.name.charAt(0).toUpperCase();
        const rating = p.avg_rating || 0;
        const stars = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
        const mult = p.avg_multiplier ? `${p.avg_multiplier}x` : '--';
        const url = p.url.replace(/^https?:\/\//, '').replace(/\/$/, '');

        return `
        <div class="provider-row" onclick="window.location.href='detail.html?id=${p.id}'">
            <div class="provider-name">
                <div class="provider-avatar">${initial}</div>
                <div class="provider-info">
                    <h3>${p.name}</h3>
                    <span>${url}</span>
                </div>
            </div>
            <div><span class="risk-badge risk-${p.risk_level}">${p.risk_level === 'untested' ? '未测' : p.risk_level}</span></div>
            <div class="avg-mult">${mult}</div>
            <div class="model-count">${p.model_count || 0}个</div>
            <div class="rating">
                <span class="stars">${stars}</span>
                <span class="rating-count">(${p.rating_count || 0})</span>
            </div>
            <div><button class="view-btn" onclick="event.stopPropagation();window.location.href='detail.html?id=${p.id}'">查看详情</button></div>
        </div>`;
    }).join('');
}

function filterProviders() {
    let filtered = allProviders;

    if (currentFilter !== 'all') {
        filtered = filtered.filter(p => p.risk_level === currentFilter);
    }

    if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(p =>
            p.name.toLowerCase().includes(q) ||
            p.url.toLowerCase().includes(q)
        );
    }

    renderProviders(filtered);
}

function updateStats(providers) {
    document.getElementById('stat-providers').textContent = providers.length;
    const tested = providers.filter(p => p.risk_level !== 'untested').length;
    document.getElementById('stat-tested').textContent = tested;
    const totalModels = providers.reduce((sum, p) => sum + (p.model_count || 0), 0);
    document.getElementById('stat-models').textContent = totalModels;
}

// Event listeners
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        filterProviders();
    });
});

document.getElementById('search').addEventListener('input', (e) => {
    searchQuery = e.target.value.trim();
    filterProviders();
});

// Init
async function init() {
    await initSupabase();
    const providers = await loadProviders();

    if (providers) {
        allProviders = providers;
        updateStats(providers);
        renderProviders(providers);
    } else {
        // Fallback: show demo data
        allProviders = getDemoData();
        updateStats(allProviders);
        renderProviders(allProviders);
    }
}

function getDemoData() {
    return [
        { name: 'OhMyGPT', url: 'https://api.ohmygpt.com', risk_level: 'untested', avg_multiplier: null, model_count: 42, avg_rating: 4.2, rating_count: 15 },
        { name: 'API2D', url: 'https://api2d.net', risk_level: 'A', avg_multiplier: 1.5, model_count: 35, avg_rating: 4.5, rating_count: 28 },
        { name: 'New API', url: 'https://newapi.pro', risk_level: 'B', avg_multiplier: 1.2, model_count: 50, avg_rating: 3.8, rating_count: 12 },
        { name: 'CloseAI', url: 'https://console.closeai-asia.com', risk_level: 'untested', avg_multiplier: null, model_count: 28, avg_rating: 0, rating_count: 0 },
        { name: 'CheapGPT', url: 'https://cheapgpt.tw', risk_level: 'C', avg_multiplier: 0.8, model_count: 18, avg_rating: 2.5, rating_count: 8 },
        { name: 'GPT API', url: 'https://gptapi.us', risk_level: 'B', avg_multiplier: 1.3, model_count: 30, avg_rating: 3.6, rating_count: 10 },
        { name: 'OneAPI', url: 'https://oneapi.pro', risk_level: 'A', avg_multiplier: 1.6, model_count: 45, avg_rating: 4.0, rating_count: 22 },
        { name: 'AI Gateway', url: 'https://aigateway.cn', risk_level: 'untested', avg_multiplier: null, model_count: 22, avg_rating: 0, rating_count: 0 },
        { name: 'Token Hub', url: 'https://tokenhub.com', risk_level: 'D', avg_multiplier: 0.5, model_count: 15, avg_rating: 1.8, rating_count: 5 },
        { name: 'NinjaAPI', url: 'https://ninjaapi.com', risk_level: 'untested', avg_multiplier: null, model_count: 38, avg_rating: 3.2, rating_count: 3 },
    ];
}

init();
</script>
